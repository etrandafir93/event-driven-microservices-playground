server:
  port: 8082

stock:
  replenishment:
    supplier:
      url: http://localhost:9999
    threshold:
      default-value: 100
      sku-specific:
        - sku: DUMMY-SKU-10
          value: 5

spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:postgresql://localhost:5432/inventory_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092

  cloud:
    function:
      definition: orderCreatedListener;itemReservationAttempt|reservationOutcomePublisher;stockReplenishment
      routing:
        enabled: true
    stream:
      default:
        content-type: application/json
      kafka:
        binder:
          brokers: ${spring.kafka.bootstrap-servers}
          enable-observation: true
      bindings:

        orderCreatedListener-in-0:
          destination: order-created
        orderCreatedListener-out-0:
          destination: item-ordered

        itemReservationAttempt|reservationOutcomePublisher-in-0:
          destination: item-ordered
        itemReservationAttempt|reservationOutcomePublisher-out-0:
          success-channel: stock-reserved
          failure-channel: stock-unavailable

        stockReplenishment-in-0:
          destination: stock-reserved


management:
  endpoints.web.exposure.include: '*'
  endpoint.prometheus.enabled: true
  tracing:
    sampling:
      probability: 1.0  # 100% sampling for dev (lower in prod)
  observations:
    annotations:
      enabled: true

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
