services:

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: demodb
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa -d demodb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── WireMock (stubs external services) ────────────────────────────────────────
  wiremock:
    image: wiremock/wiremock:3.6.0
    ports:
      - "8090:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings

  # ── Toxiproxy (latency injection) ─────────────────────────────────────────────
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    ports:
      - "8474:8474"   # Toxiproxy API
      - "5433:5433"   # DB proxy  → postgres:5432
      - "8091:8091"   # HTTP proxy → wiremock:8080
    volumes:
      - ./toxiproxy/config.json:/config/toxiproxy.json
    command: ["-config", "/config/toxiproxy.json", "-host", "0.0.0.0"]
    depends_on:
      postgres:
        condition: service_healthy
      wiremock:
        condition: service_started

  # ── Toxiproxy init — adds latency toxics via REST API ─────────────────────────
  toxiproxy-init:
    image: curlimages/curl:latest
    depends_on:
      toxiproxy:
        condition: service_started
    restart: "no"
    entrypoint: >
      sh -c "
        sleep 2 &&
        curl -sf -X POST http://toxiproxy:8474/proxies/postgres/toxics
          -H 'Content-Type: application/json'
          -d '{\"type\":\"latency\",\"name\":\"db-latency\",\"attributes\":{\"latency\":100,\"jitter\":10}}' &&
        curl -sf -X POST http://toxiproxy:8474/proxies/wiremock/toxics
          -H 'Content-Type: application/json'
          -d '{\"type\":\"latency\",\"name\":\"wm-latency\",\"attributes\":{\"latency\":235,\"jitter\":15}}'
      "

  # ── LGTM all-in-one (Loki + Grafana + Tempo + Prometheus + OTel Collector) ────
  lgtm:
    image: grafana/otel-lgtm:0.8.1
    ports:
      - "3000:3000"   # Grafana UI
      - "3100:3100"   # Loki push API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9090:9090"   # Prometheus query API
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 200ms
    volumes:
      - ./observability/grafana/provisioning/dashboards/slimdemo.json:/otel-lgtm/slimdemo.json
      - ./observability/grafana/provisioning/dashboards/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/slimdemo-dashboards.yaml
      - ./observability/grafana/provisioning/datasources/datasources.yaml:/otel-lgtm/grafana/conf/provisioning/datasources/slimdemo-datasources.yaml
